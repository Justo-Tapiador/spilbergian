version: '3.9'

services:
  spilbergian:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: spilbergian-v3:latest
    container_name: spilbergian-v3
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../data:/app/data
      - ../config:/app/config:ro
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: Ollama sidecar for local LLM (llama.cpp, mistral, etc.)
  ollama:
    image: ollama/ollama:latest
    container_name: spilbergian-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm

volumes:
  ollama_data:
